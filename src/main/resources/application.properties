spring.application.name=api

# datasource
# DB_PASSWORD (obrigatório) e demais valores devem vir de variáveis de ambiente/secret manager.
# Nunca commitar credenciais reais neste arquivo.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db-xtech}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
server.port=${PORT:8080}

# Pool do Hikari - deliberadamente pequeno. Sem o pooler do Neon na frente (ver CLAUDE.md,
# "Multi-tenancy" - o pooler/PgBouncer em modo transação quebra o SET search_path por
# tenant), cada conexão do Hikari é uma conexão real no Postgres, e o plano free do Neon
# tem um limite baixo de conexões simultâneas. Ajustável via env var sem redeploy de código.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1500000}

# CORS - lista de origens permitidas, separadas por vírgula
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.10.20:5173,http://192.168.10.20}

# JWT - app.jwt.secret é obrigatório (defina via variável de ambiente APP_JWT_SECRET),
# sem valor padrão para impedir chave previsível assinando tokens em produção.
# Cookie de sessão: desabilitar Secure em desenvolvimento local para permitir acesso via HTTP.
# Em produção (front e back em domínios diferentes), definir COOKIE_SECURE=true via variável de
# ambiente — isso também ativa SameSite=None, exigido para cookies cross-site (ver AuthController).
app.cookie.secure=${COOKIE_SECURE:false}

# Configuração do schema
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Multi-tenancy (schema por tenant) - ver com.sysluna.api.infrastructure.tenant.
# Tenant e User vivem no schema "crm_setup" (compartilhado, ver TenantSchemaNames.IDENTITY_SCHEMA);
# as demais entidades resolvem o schema em tempo de execução via
# MultiTenantConnectionProvider/CurrentTenantIdentifierResolver.
# Guarda apenas o slug do tenant "default" - o schema físico (crm_<slug>) é sempre
# calculado em código (TenantSchemaNames.forSlug), nunca gravado no banco. Usado para
# criar o tenant default num install novo e como fallback fora de uma requisição
# autenticada (ex.: jobs, testes que chamam repositórios diretamente sem passar pelo
# JwtAuthenticationFilter).
app.tenant.default-slug=${TENANT_DEFAULT_SLUG:default}

# Segredo exigido para provisionar novos tenants via POST /api/tenants (ver TenantController).
# Sem valor padrão, propositalmente, para impedir provisionamento não autorizado em produção.
app.provisioning.secret=${APP_PROVISIONING_SECRET}

# Cache (Redis) - ver com.sysluna.api.infrastructure.cache/config. Cada cache é namespaced por
# tenant em runtime (TenantCacheResolver), então nenhuma configuração aqui precisa saber de
# schema; requer um Redis acessível (local via docker run -p 6379:6379 redis, ou um provedor
# gerenciado como Upstash - nesse caso REDIS_SSL=true é obrigatório, e REDIS_HOST é só o
# hostname, sem usuário/senha/protocolo embutidos).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.cache.type=redis

# Logging (não logar valores de bind - podem conter senhas/dados sensíveis)
logging.level.org.hibernate.SQL=warn

# Configuração do Flyway (schema global "crm_setup": tabelas tenant e user)
# As migrations por tenant (schema de negócio) são aplicadas separadamente e
# programaticamente por TenantFlywayMigrator, não por este Flyway autoconfigurado.
spring.flyway.schemas=crm_setup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/global
spring.flyway.baseline-on-migrate=true

# Exception
spring.web.error.include-stacktrace=never

# Saída utilizando cores para destacar informações
spring.output.ansi.enabled=always

# spring.devtools
spring.devtools.restart.enabled=true

# springdoc
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.defaultModelsExpandDepth=-1